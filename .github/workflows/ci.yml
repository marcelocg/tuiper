name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    name: Test & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test

  build:
    name: Build ${{ matrix.label }} binary
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            script: build:linux
            artifact: dist/tuiper-linux-x64
          - os: macos-latest
            label: macos
            script: build:mac
            artifact: dist/tuiper-darwin-arm64
          - os: windows-latest
            label: windows
            script: build:win
            artifact: dist/tuiper-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run ${{ matrix.script }}
      - uses: actions/upload-artifact@v5
        with:
          name: tuiper-${{ matrix.label }}
          path: ${{ matrix.artifact }}

  release:
    name: Attach binaries to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create/update the Release
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tuiper-linux-x64
            dist/tuiper-darwin-arm64
            dist/tuiper-windows-x64.exe
          generate_release_notes: true
