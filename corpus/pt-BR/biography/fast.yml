- id: pt-br-biography-fast-minha-forma-o-1
  title: "Minha Formação"
  author: "Joaquim Nabuco"
  source: "Project Gutenberg ebook #76030"
  source_url: https://www.gutenberg.org/ebooks/76030
  text: >
    O fato é que amei Londres acima de todas as outras cidades e lugares que
    percorri. Tudo em Londres me feria uma nota íntima de longa ressonância: as
    suas extensas campinas e os seus bosques, como o tijolo ennegrecido das suas
    construcções; o movimento atordoador de Regent Circus ou Ludgate Hill, como os
    recessos de Kensington Park, a sombra do arvoredo secular; os seus dias
    quentes de verão, quando o asphalto amollece debaixo dos pés, a folhagem se
    cobre de poeira, e o ar tem o calor seco das thermas, como os seus deliciosos
    dias de maio e junho, quando as mais altas janellas se transformam em jardins
    suspensos, e as grandes cestas dos parques se enchem de tulipas e jacinthos;
    as suas noites de luar, que faziam Park Lane parecer-me às vezes na nevoa, com
    a sua rua de palacios, um trecho de Veneza, e que de Piccadilly, olhando.
- id: pt-br-biography-fast-minha-forma-o-2
  title: "Minha Formação"
  author: "Joaquim Nabuco"
  source: "Project Gutenberg ebook #76030"
  source_url: https://www.gutenberg.org/ebooks/76030
  text: >
    Sem ele a convicção da superioridade do tipo político da Inglaterra não teria
    bastado. Quanto a sensação aristocratica da vida, de que também fallei, essa,
    no combate dos partidos, não teria resistido ao primeiro choque. O que entendo
    por espírito inglez neste caso é a norma tacita de conducta a que a Inglaterra
    toda parece obedecer, o centro de inspiração moral que governa todos os seus
    movimentos. Vi quase nada da Inglaterra, sinto dizel-o, mas vi pedaços que me
    impedem quase de querer vêr o resto, excepto Oxford, cujo lugar tenho vago em
    minha galeria interior, a espera do seu pequeno quadro. Vi, por exemplo,
    Cantuaria, e tenho no pensamento a calma, o silencio, a grandeza daquella
    imponente massa recolhida em si mesma. Vi, na semana de Cowes, Southampton e a
    ilha de Wight, pequena sombra da Inglaterra no mar, sombra colorida, movente e
    alegre. Fui em carruagem,--poderá haver um.
- id: pt-br-biography-fast-minha-forma-o-3
  title: "Minha Formação"
  author: "Joaquim Nabuco"
  source: "Project Gutenberg ebook #76030"
  source_url: https://www.gutenberg.org/ebooks/76030
  text: >
    Ao reler hoje esta página do meu diário de 1871, vejo que a minha explicação
    da unidade da carreira politica de Thiers se parece muito com a que, há alguns
    anos, foi publicada de Talleyrand, justificando-se em suas _Memorias_ de só
    ter mudado com a França e por causa da França. Esses trechos mostram que em
    Nova-York eu não me achava sob a influencia americana, mas que continuava em
    mim a influencia européa e eu era o espectador, que tinha sido em Londres,
    quase desinteressado da politica, desinteressado pelo menos de toda a politica
    que não pudesse converter em assumpto literário, ou em nota critica e
    observação. Agora direi a minha impressão geral dos Estados-Unidos, o que é
    hoje a minha ideia da _democracia na America_.
- id: pt-br-biography-fast-cenas-de-viagem-4
  title: "Cenas de viagem"
  author: "Visconde de Taunay"
  source: "Project Gutenberg ebook #33611"
  source_url: https://www.gutenberg.org/ebooks/33611
  text: >
    N'esse mesmo lugar, que denominámos _Pouso dos Boritys_[10], existião os
    vestigios de um acampamento paraguaio, formado por ocasião do prolongamento da
    invasão, em Abril de 1865, até o Coxim e a fazenda de Luiz Theodoro[11].
    Galhos fincados no chão e apoiados uns nos outros, com a ramagem para cima,
    formavão ranchos improvisados, em que se haviam abrigado os soldados, sob a
    coberta do ponche estendido por cima. A certa distância, achava-se um cercado
    para a cavalhada e, pelos arredores, estavam varios objectos de picaria, ao
    lado de ossadas dos cavallos, que eram degolados, a medida que afrouxavão. A
    ida dos paraguayos ao Coxim foi feita com celeridade estupenda; a artilharia
    passou por lugares medonhos e, em poucos dias, completárão eles uma viagem
    redonda de 146 léguas, no tempo da maior inclemencia de aguas. Se bem tivessem
    levado excelente cavalhada, voltárão muitos dos expedicionarios a pé, pois
    que a peste, comum.
- id: pt-br-biography-fast-cenas-de-viagem-5
  title: "Cenas de viagem"
  author: "Visconde de Taunay"
  source: "Project Gutenberg ebook #33611"
  source_url: https://www.gutenberg.org/ebooks/33611
  text: >
    Para medirmos com alguma exatidão as distâncias, que tinham de ser
    ministradas ao comando das forças, viamo-nos obrigados a acompanhar um dos
    cargueiros que nos dava a maior uniformidade de movimento. A estimativa era a
    media do tempo gasto em diversas observações, para percorrer uma extensão
    medida, havendo sido tomado para unidade o minuto, que achámos correspondente
    a 30 braças ,355. A nossa qualidade oficial não nos permittia o pouco mais ou
    menos: entretanto caminhar assim, é sobre fastidioso, em extremo cançativo.
    Accresce ainda a urgencia de não distrahir-se um momento, consultar a todo
    instante o relogio, tomar nota das menores particularidades, verificar
    qualquer parada e visar, de quarto em quarto de légua, o rumo magnetico, em
    que se marcha, para o que nos servia a excelente bussola prismatica do
    capitão Karter, tão commoda e própria para esses trabalhos.
- id: pt-br-biography-fast-cenas-de-viagem-6
  title: "Cenas de viagem"
  author: "Visconde de Taunay"
  source: "Project Gutenberg ebook #33611"
  source_url: https://www.gutenberg.org/ebooks/33611
  text: >
    O caminho, como já o havemos feito sentir, é uma simples trilha. De natureza
    argilo-silicosa (época terciaria), póde ser considerado seco, com excepção de
    alguns pontos, que serião facilmente transpostos. Com exclusão do Portão de
    Roma, proximidades do Lageadinho, margens de corregos e ribeirões, os declives
    são sempre bons. A nossa verdadeira missão ia ter principio. Verificar a
    possibilidade de uma passagem, até o Aquidauana, no tempo das aguas, quando os
    pantanaes se tornão intransitaveis, seguir, ao longo da serra de Maracajú, uma
    pretendida senda, que fugitivos haviam aberto; observar a natureza dos
    terrenos e os obstaculos que pudessem impedir a descida das forças nos meses
    de Abril e Maio, continuar ainda mais a exploração até o rio Aquidauana, cuja
    margem esquerda estava ocupada pelo inimigo, apromptar os meios de passagem
    para aquele rio, era o nosso programma, vasto e brilhante, importando não
    pequena responsabilidade, mas cuja boa execução principalmente.
- id: pt-br-biography-fast-cenas-de-viagem-7
  title: "Cenas de viagem"
  author: "Visconde de Taunay"
  source: "Project Gutenberg ebook #33611"
  source_url: https://www.gutenberg.org/ebooks/33611
  text: >
    Uma graminea pardacenta, muito baixa, que parece vegetar com dificuldade,
    algumas _synanthereas_, espalhadas aqui e acolá, e poucos pés de _mimosas_,
    constituem o aspecto botanico d'esses barreiros. Às vezes também aparece uma
    bignoniacea, o _para-tudo_[29], principalmente para os lados do Apa e norte da
    republica do Paraguay. D'aí a horas, voltárão os caçadores, cabisbaixos,
    merencorios: nenhuma pontaria acertára. O gado, bravio em extremo, fugia
    apenas presentia qualquer vulto e sua obtenção, por arma de fogo, tornava-se
    tão difícil, quanto a de qualquer animal das selvas. Refreando as redeas a
    appetencia, que se havia despertado ao som dos tiros, para melhores ocasiões,
    passámos a noite, impacientes pela manhã. Entretanto esse primeiro dia devia
    de ser o resumo de toda a nossa viagem.
- id: pt-br-biography-fast-cenas-de-viagem-8
  title: "Cenas de viagem"
  author: "Visconde de Taunay"
  source: "Project Gutenberg ebook #33611"
  source_url: https://www.gutenberg.org/ebooks/33611
  text: >
    O rio Aquidauana, em Marco de 1866, formava a linha divisoria material entre o
    Brasil e a republica do Paraguay e o districto todo de Miranda, a mais linda
    porção da província de Mato Grosso, achava-se ocupado debaixo do titulo de
    districto militar de Mbotety[52]. A margem esquerda era guardada por um forte
    destacamento e cuidadosamente rondada em toda sua extensão, e, bem que, desde
    Maio de 1865, o presidente Lopez houvesse prohibido[53] a transposição do rio
    aos seus soldados, as correrias, no outro lado, tinham-se dado varias vezes,
    com grande susto da população dos Morros.
- id: pt-br-biography-fast-cenas-de-viagem-9
  title: "Cenas de viagem"
  author: "Visconde de Taunay"
  source: "Project Gutenberg ebook #33611"
  source_url: https://www.gutenberg.org/ebooks/33611
  text: >
    O valor absoluto das ideias do utopista é tão precioso que, ainda com prejuizo
    da indispensavel necessidade do conhecimento dos homens, devemos desviar os
    olhos das lições d'aquela perigosa experiencia: bastão os desgostos no correr
    da vida normal, bastão os desenganos na sociedade polida, no mundo civilisado,
    em seus eixos, em seu curso natural. Em dois importantes grupos se divide a
    raça índia, habitante de Miranda: os _guaycurús_ e os _chanés_. Os primeiros
    comprehendem três tribus: a _guaycurú_, propriamente dita, que vai
    desaparecendo pelo contacto immediato com a gente branca, os _cadiuéos_ que,
    pelo contrario, conservão-se no estado quase selvatico, em terrenos proximos
    aos rios Paraguay e Nabilek, ainda não bem explorados, e os _beaquiéos_ que
    habitão com os cadiuéos[76].
- id: pt-br-biography-fast-cenas-de-viagem-10
  title: "Cenas de viagem"
  author: "Visconde de Taunay"
  source: "Project Gutenberg ebook #33611"
  source_url: https://www.gutenberg.org/ebooks/33611
  text: >
    Deixando o pouso dos Boritys que oferecerá um acampamento regular para as
    forças em marcha, com 36 milhas de marcha fomos ter ao corrego da Porteira, a
    77 minutos do qual passámos outro, chegando ao ribeirão da Mata depois de
    caminharmos mais 95 minutos. A 50 braças antes d'esta corrente, existe um
    terreno baixo que há de tornar-se alagadiço com a continuação de chuvas,
    podendo ser praticada, n'este caso, uma extensa estiva pelo muito mato, que
    cobre as margens do ribeirão. A 16 minutos do ribeirão da Mata, existe uma
    casa abandonada, próxima a um capão, denominado Tapera, assim como o corrego,
    que, pouco adiante, dirige-se para E. entre margens pouco firmes, permittindo
    porém a proximidade do mato fazer-se de prompto uma estiva para a passagem de
    cargueiros e carros. D'aí a 8 minutos passámos um pequeno pantano de 30
    braças, que póde dar boa passagem, se as chuvas não.
