- id: pt-br-biography-medium-minha-forma-o-1
  title: "Minha Formação"
  author: "Joaquim Nabuco"
  source: "Project Gutenberg ebook #76030"
  source_url: https://www.gutenberg.org/ebooks/76030
  text: >
    Politicamente o fundo liberal ficou intacto, sem mistura sequer de
    tradicionalismo. Seria difícil colher-se em todo o meu pensamento um resquicio
    de tendência conservadora. Liberal, eu o era de uma só peça; o meu peso, a
    minha densidade democratica era maxima. Nesse tempo dominava a Academia, com a
    seducção da sua palavra e de sua figura, o segundo José Bonifacio. Os
    _leaders_ da Academia, Ferreira de Menezes, que, apezar de formado, continuava
    academico e chefe literário da mocidade, Castro Alves, o poeta republicano de
    _Gonzaga_, bebiam-lhe as palavras, absorviam-se nelle em extasis. Ruy Barbosa
    era dessa geração; mas Ruy Barbosa, hoje a mais poderosa machina cerebral do
    nosso país, que pelo número das rotações e força de vibração faz lembrar os
    machinismos que impellem através das ondas os grandes «transatlanticos», levou
    vinte anos a tirar do minerio do seu talento, a endurecer e temperar, o aço
    admirável que é agora.
- id: pt-br-biography-medium-minha-forma-o-2
  title: "Minha Formação"
  author: "Joaquim Nabuco"
  source: "Project Gutenberg ebook #76030"
  source_url: https://www.gutenberg.org/ebooks/76030
  text: >
    As ideias que devo a Bagehot são poucas, mas são todas elas, por assim dizer,
    chaves de sistemas e concepções politicas, de verdadeiros estados do espírito
    moderno. Foi ele, por exemplo, quem me deu a ideia do que ele chamou _governo
    de gabinete_, como sendo a alma da moderna Constituição ingleza. «No governo
    de gabinete, diz ele, o poder legislativo escolhe o executivo, especie de
    commissão, que ele encarrega do que respeita a parte prática dos negocios e
    assim os dois poderes se harmonisam, porque o poder legislativo póde mudar a
    sua commissão, se não está satisfeito com ela ou si lhe prefere outra. E, no
    emtanto,--tal é a delicadeza do mechanismo,--o poder executivo não fica
    absorvido a ponto de obedecer servilmente, porquanto tem o direito de fazer a
    legislatura comparecer perante os eleitores, para que estes lhe componham uma
    Camara mais favoravel às suas ideias.»
- id: pt-br-biography-medium-minha-forma-o-3
  title: "Minha Formação"
  author: "Joaquim Nabuco"
  source: "Project Gutenberg ebook #76030"
  source_url: https://www.gutenberg.org/ebooks/76030
  text: >
    Em tempo de guerra ou de relações diplomaticas complicadas, é que se vê o
    defeito desse sistema em toda a luz. Esse sistema, diz Bagehot, póde-se
    resumir em uma palavra:--«_governar pelo desconhecido_». «Ninguem na America
    tinha a menor ideia do que podia ser M. Lincoln nem do que ele poderia fazer.
    Sob o governo de gabinete, pelo contrario, os homens de Estado principaes são
    familiarmente conhecidos de todos, não sómente pelos seus nomes, mas pelas
    suas ideias. Nós nem mesmo imaginamos que se possa confiar o exercicio da
    soberania a um desconhecido.» Devo outras ideias a Bagehot. Antes de o lêr, eu
    tinha o preconceito democratico contra a hereditariedade, o principio
    dynastico e a influencia aristocratica. Foi esse _democrata_ que me fez
    comprehender como o que ele chamou as partes _imponentes_ da Constituição
    ingleza, «as que produzem e conservam o respeito das populações», são tão
    importantes como as _efficientes_, «as.
- id: pt-br-biography-medium-minha-forma-o-4
  title: "Minha Formação"
  author: "Joaquim Nabuco"
  source: "Project Gutenberg ebook #76030"
  source_url: https://www.gutenberg.org/ebooks/76030
  text: >
    Sou antes um espectador do meu século do que do meu país: a peça é para mim a
    civilização, e se está representando em todos os teatros da humanidade,
    ligados hoje pelo telegrapho. Uma affeição maior, um interesse mais próximo,
    uma ligação mais íntima, faz com que a scena, quando se passa no Brasil, tenha
    para mim importancia especial, mas isto não se confunde com a pura emoção
    intellectual; é um prazer ou uma dôr, por assim dizer domestica, que interessa
    o coração; não é um grande espectaculo, que prende e domina a intelligencia. A
    abolição no Brasil me interessou mais do que todos os outros fatos ou séries
    de fatos de que fui contemporaneo; a expulsão do Imperador me abalou mais
    profundamente do que todas as quedas de thronos ou catastrophes nacionaes que
    acompanhei de longe; por último, não experimentei nenhuma sensação tão cheia,
    tão prolongada, tão viva, durante.
- id: pt-br-biography-medium-minha-forma-o-5
  title: "Minha Formação"
  author: "Joaquim Nabuco"
  source: "Project Gutenberg ebook #76030"
  source_url: https://www.gutenberg.org/ebooks/76030
  text: >
    É provável que em mim também existisse o embryão republicano; não duvido que,
    nascido em outra condição, se não tivesse meu pai na mais alta hierarchia da
    politica, se não descobrisse, como tantos outros que se revoltaram, modo de
    vencer o terrível _multi sunt vocati, pauci vero electi_ da antiga
    _oligarchia_, eu também tivesse acompanhado o movimento republicano de 1870,
    do qual faziam parte alguns dos espíritos que me fascinavam. Si assim fosse,
    porém, estou certo que o movimento abolicionista me teria, mais tarde,
    destacado dele, e que o 13 de maio me identificaria com a sorte da monarchia
    libertadora. Si, apezar de tudo, eu me tivesse conservado republicano até 15
    de novembro,--nascesse eu em que condição nascesse, uma vez que fosse o mesmo
    que sou, isto é, que tivesse recebido no berço os mesmos rudimentos
    d'alma,--não tenho a menor dúvida de que o abalo, o choque do desterro do.
- id: pt-br-biography-medium-minha-forma-o-6
  title: "Minha Formação"
  author: "Joaquim Nabuco"
  source: "Project Gutenberg ebook #76030"
  source_url: https://www.gutenberg.org/ebooks/76030
  text: >
    «Sôa como um paradoxo, escreveu, com admirável lucidez, um dos hábeis
    redatores da _Quarterly Review_ em 1890, mas não é por isso menos exacto, que
    a principal barreira diante de uma restauração monarchica em França é o
    crescente conservatismo que foi sempre inherente ao caracter francez no meio
    de todas as ebullições do sentimento excitado. O povo sabe que uma mudança na
    fórma de governo só poderia ser realisada por meio de uma revolução ou como
    resultado de uma guerra, e recúa diante da perspectiva de uma e outra
    eventualidade, preferindo acceitar o presente estado de coisas, ainda que este
    não lhe desperte enthusiasmo.»
- id: pt-br-biography-medium-minha-forma-o-7
  title: "Minha Formação"
  author: "Joaquim Nabuco"
  source: "Project Gutenberg ebook #76030"
  source_url: https://www.gutenberg.org/ebooks/76030
  text: >
    O fato é que não possúo a fórma do verso, na qual a ideia se modela por si
    mesma e donde sáe com o timbre próprio da verdadeira rima, que nenhum
    artificio nem esforço póde imitar. Isto, por um lado, quanto a pequena poesia,
    a poesia solta, ao que se póde chamar a musica da poesia. Quanto a grande
    poesia, a poesia de imaginação e creação, poema, romance, bailada que fosse,
    para essa eu seria incapaz, além da insufficiencia do talento, pela falta de
    coragem para habitar a região solitaria dos espíritos creadores, os quaes
    vivem naturalmente entre figuras tiradas de si mesmos, sem vida própria,
    automatos da sua intelligencia e da sua vontade, como em um sonho accordado.
    Nessa altura, onde tudo é ficticio, tudo irreal, tudo fantastico, a poesia tem
    para mim o terror do _adytum_ da Pythia. Mesmo quando as figuras sejam meigas,
    suaves, humanas, a creação.
- id: pt-br-biography-medium-cenas-de-viagem-8
  title: "Cenas de viagem"
  author: "Visconde de Taunay"
  source: "Project Gutenberg ebook #33611"
  source_url: https://www.gutenberg.org/ebooks/33611
  text: >
    Coube-me a felicidade de ter para companheiro n'essa viagem, o muito
    illustrado e digno engenheiro, o meu amigo Dr. Antonio Florencio Pereira do
    Lago, capitão d'estado-maior de 1^a classe, cujo espírito eminentemente
    methodico e cultivado e cuja intelligencia, ornada dos mais preciosos dotes da
    alma, vão-se tornando, felizmente para a nobre classe a que pertence, de dia
    em dia mais conhecidos. Sobre este local existira grande controversia; uns o
    apresentavão como excelente ponto de estação para os nossos soldados,
    dando-lhe as honras de posição estrategica, outros, contrariando fortemente
    tal opinião, fundados no conhecimento da localidade, tiravão-lhe toda a
    importancia de que era revestido. Na realidade, o melhor possível para a
    formação de uma colonia, como existe desde 1862 projecto, acha-se o ponto
    falto de todas as condições para ser considerado como militar, pronunciando-se
    a commissão de engenheiros contra a escolha d'ele, quando fôra consultada.
- id: pt-br-biography-medium-cenas-de-viagem-9
  title: "Cenas de viagem"
  author: "Visconde de Taunay"
  source: "Project Gutenberg ebook #33611"
  source_url: https://www.gutenberg.org/ebooks/33611
  text: >
    Sobre este local existira grande controversia; uns o apresentavão como
    excelente ponto de estação para os nossos soldados, dando-lhe as honras de
    posição estrategica, outros, contrariando fortemente tal opinião, fundados no
    conhecimento da localidade, tiravão-lhe toda a importancia de que era
    revestido. Na realidade, o melhor possível para a formação de uma colonia,
    como existe desde 1862 projecto, acha-se o ponto falto de todas as condições
    para ser considerado como militar, pronunciando-se a commissão de engenheiros
    contra a escolha d'ele, quando fôra consultada. Entretanto aí passaram as
    forças os meses da estação pluviosa. Esta fase do ano, determinada claramente,
    durante o verão, nas províncias do interior do Brasil, começa geralmente a 8
    de Setembro e vai, com mais ou menos regularidade, até os fins de Abril. As
    enchentes e trasbordamentos de rios n'uma zona baixa e plana, como a de quase
    toda a província de Mato-Grosso, são correspondentes a esta.
- id: pt-br-biography-medium-cenas-de-viagem-10
  title: "Cenas de viagem"
  author: "Visconde de Taunay"
  source: "Project Gutenberg ebook #33611"
  source_url: https://www.gutenberg.org/ebooks/33611
  text: >
    Antes de deixarmos o Coxim, talvez para sempre, algumas palavras; e sejam elas
    o nosso adeus, adeus sem saudades, apezar do seu majestoso Taquari[1], de sua
    verde mataria, de suas lindas garças, de seu _facies_ melancolico, de seu céo
    puro e noites scintillantes que terião feito surgir em nós poeticos sonhos, se
    o estomago--e quantas vezes!--não reagisse dolorosamente com exigencias
    dificeis de satisfazer. A posição do Coxim é pitoresca,--salutar relativamente
    a zona em que se ergue esse torrão--a vegetação bonita. Os terrenos patenteão
    superabundancia de arêa, alguma argila; são ondulados sensivelmente,
    elevando-se até em outeiros que vão se unir a grande cadêa de Maracajú, a
    qual, dez a doze léguas além, levanta-se ao longo do caminho do rio Negro.
