- id: pt-br-biography-slow-como-e-porque-sou-romancista-1
  title: "Como e porque sou romancista"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #29040"
  source_url: https://www.gutenberg.org/ebooks/29040
  text: >
    Seria esse o _livro dos meus livros_. Se n'alguma hora de pachorra, me
    dispusesse a refazer a cansada jornada dos quarenta e quatro anos, já
    completos; os curiosos de anedotas literárias saberiam, além de muitas
    outras coisas minimas, como a inspiração do Guarany, por mim escrito aos 27
    anos, cahio na imaginação da criança de nove, ao atravessar as matas e sertões
    do norte em jornada do Ceará a Bahia. Quando me recolho da labutação diaria
    com o espírito mais desprendido das preocupações do presente, e succede-me ao
    passar pela rua do Lavradio pôr os olhos na taboleta do colégio que ainda lá
    está na sacada do n. 17, mas com diversa designação; transporto-me
    insensivelmente áquelle tempo, em que de fraque e boné, com os livros
    sobraçados, eu esperava ali na calçada fronteira o toque da sineta que
    annunciava a abertura das aulas.
- id: pt-br-biography-slow-como-e-porque-sou-romancista-2
  title: "Como e porque sou romancista"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #29040"
  source_url: https://www.gutenberg.org/ebooks/29040
  text: >
    Quando me recolho da labutação diaria com o espírito mais desprendido das
    preocupações do presente, e succede-me ao passar pela rua do Lavradio pôr os
    olhos na taboleta do colégio que ainda lá está na sacada do n. 17, mas com
    diversa designação; transporto-me insensivelmente áquelle tempo, em que de
    fraque e boné, com os livros sobraçados, eu esperava ali na calçada fronteira
    o toque da sineta que annunciava a abertura das aulas. Toda minha vida
    colegial se desenha no espírito com tão vivas cores, que parecem frescas de
    ontem, e todavia mais de trinta anos já lhes pairaram sobre. Vejo o enxame dos
    meninos, alvoriçando na loja, que servia de saguão; assisto aos manejos da
    cabala para a próxima eleição do monitor geral; oiço o tropel do bando que
    sobe as escadas, e se dispersa no vasto salão onde cada um busca o seu banco
    numerado.
- id: pt-br-biography-slow-como-e-porque-sou-romancista-3
  title: "Como e porque sou romancista"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #29040"
  source_url: https://www.gutenberg.org/ebooks/29040
  text: >
    Toda minha vida colegial se desenha no espírito com tão vivas cores, que
    parecem frescas de ontem, e todavia mais de trinta anos já lhes pairaram
    sobre. Vejo o enxame dos meninos, alvoriçando na loja, que servia de saguão;
    assisto aos manejos da cabala para a próxima eleição do monitor geral; oiço o
    tropel do bando que sobe as escadas, e se dispersa no vasto salão onde cada um
    busca o seu banco numerado. Januario era talvez rispido e severo em demazia;
    porém, nenhum professor o excedeu no zelo e enthusiasmo com que desempenhava o
    seu arduo ministerio. Identificava-se com o discipulo; transmittia-lhe suas
    emoções e tinha o dom de crear no coração infantil os mais nobres estimulos,
    educando o espírito com a emulação escholastica para os grandes certamens da
    intelligencia.
- id: pt-br-biography-slow-como-e-porque-sou-romancista-4
  title: "Como e porque sou romancista"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #29040"
  source_url: https://www.gutenberg.org/ebooks/29040
  text: >
    Januario era talvez rispido e severo em demazia; porém, nenhum professor o
    excedeu no zelo e enthusiasmo com que desempenhava o seu arduo ministerio.
    Identificava-se com o discipulo; transmittia-lhe suas emoções e tinha o dom de
    crear no coração infantil os mais nobres estimulos, educando o espírito com a
    emulação escholastica para os grandes certamens da intelligencia. Os modestos
    triumphos, que todos nós obtemos na eschola, e que não vêm ainda travados de
    fel como as mentidas ovações do mundo; essas primicias literárias tão puras,
    devo-as a ele, a meu respeitavel mestre que talvez deixou em meu animo o
    germen dessa fertil ambição de correr apoz uma luz que nos foge; illusão que
    felizmente já dissipou-se.
- id: pt-br-biography-slow-como-e-porque-sou-romancista-5
  title: "Como e porque sou romancista"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #29040"
  source_url: https://www.gutenberg.org/ebooks/29040
  text: >
    Lia-se até a hora do chá, e topicos havia tão interessantes que eu era
    obrigado a repetição. Compensavam esse excesso, as pausas para dar lugar às
    expansões do auditorio, o qual desfazia-se em recriminações contra algum máo
    personagem, ou acompanhava de seus votos e sympathias o heróe perseguido. Uma
    noite, daquellas em que eu estava mais possuido do livro, lia com expressão
    uma das páginas mais commoventes da nossa bibliotheca. As senhoras, de cabeça
    baixa, levavam o lenço ao rosto, e poucos momentos depois não poderam conter
    os soluços que rompiam-lhes o seio. Comprehendeu o Padre Carlos e soltou uma
    gargalhada, como ele as sabia dar, verdadeira gargalhada homerica, que mais
    parecia uma salva de sinos a repicarem do que riso humano. E apoz esta, outra
    e outra, que era ele inexgotavel, quando ria de abundancia de coração, com o
    genio prazenteiro de que a natureza o dotara.
- id: pt-br-biography-slow-minha-forma-o-6
  title: "Minha Formação"
  author: "Joaquim Nabuco"
  source: "Project Gutenberg ebook #76030"
  source_url: https://www.gutenberg.org/ebooks/76030
  text: >
    «Esta manhã, casaes de borboletas brancas, douradas, azues, passam innumeras
    contra o fundo de bambús e samambaias da montanha. E um prazer para mim vêl-as
    voar, não o seria, porém, apanhal-as, pregal-as em um quadro... Eu não quizera
    guardar d'elas sinão a impressão viva, o fremito de alegria da natureza,
    quando elas cruzam o ar, agitando as flôres. Em uma collecção, é certo, eu as
    teria sempre diante da vista, mortas, porém, como uma poeira conservada junta
    pelas côres sem vida... O modo unico para mim de guardar essas borboletas
    eternamente as mesmas, seria fixar o seu voo instantaneo pela minha nota
    íntima equivalente... Como com as borboletas, assim com todos os outros
    deslumbramentos da vida... De nada nos serve recolher o despojo; o que
    importa, é só o raio interior que nos feriu, o nosso contacto com eles... e
    este como que eles também o levam embora comsigo.»
- id: pt-br-biography-slow-minha-forma-o-7
  title: "Minha Formação"
  author: "Joaquim Nabuco"
  source: "Project Gutenberg ebook #76030"
  source_url: https://www.gutenberg.org/ebooks/76030
  text: >
    Não preciso remontar ao colégio, ainda que ali, provavelmente, tenha sido
    lançada no subsolo da minha razão a camada que lhe serviu de alicerce: o fundo
    hereditario do meu liberalismo. Meu pai nessa epocha (1864-1865) tinha
    terminado a sua passagem do campo conservador para o liberal, marcha
    inconscientemente começada desde a Conciliação (1853-57), consciente, pensada
    desde o discurso que ficou chamado do _uti possidetis_ (1862). Houve diversas
    migrações em nossa historia politica do lado liberal para o conservador. Os
    homens da Regencia, que entraram na vida publica ou subiram ao poder
    representando a ideia de revolução, foram com a madureza dos anos restringindo
    as suas aspirações, aproveitando a experiencia, estreitando-se no circulo de
    pequenas ambições e no desejo de simples aperfeiçoamento relativo, que
    constitue o espírito conservador. O senador Nabuco, porém, foi quem iniciou,
    guiou, arrastou um grande movimento em sentido contrario, do campo conservador
    para o liberal, da velha.
- id: pt-br-biography-slow-minha-forma-o-8
  title: "Minha Formação"
  author: "Joaquim Nabuco"
  source: "Project Gutenberg ebook #76030"
  source_url: https://www.gutenberg.org/ebooks/76030
  text: >
    Na situação em que fui para S. Paulo cursar o primeiro ano da Academia, eu não
    podia deixar de ser um estudante liberal. Desde o primeiro ano fundei um
    pequeno jornal para atacar o ministerio Zacharias. Meu pai, que apoiava esse
    ministerio escrevia-me que estudasse, me deixasse de jornaes e sobretudo de
    attitudes politicas em que se podia vêr, sinão uma inspiração, pelo menos uma
    tolerancia da parte dele. Eu, porém, prezava muito a minha _independencia de
    jornalista_, a minha _emancipação de espirito_: queria sentir-me livre,
    julgava-me compromettido perante a minha _classe_, a academica, e assim
    illudia, sem pensar desobedecer, o desejo de meu pai, que, provavelmente, não
    ligava grande importancia a minha opposição ao ministerio amigo. Nesse tempo
    as _Cartas de Erasmo_, que produziam no país uma reviviscencia conservadora,
    me pareciam a obra prima da litteratura politica.
- id: pt-br-biography-slow-cenas-de-viagem-9
  title: "Cenas de viagem"
  author: "Visconde de Taunay"
  source: "Project Gutenberg ebook #33611"
  source_url: https://www.gutenberg.org/ebooks/33611
  text: >
    Quando eu a executava, o sentimento do dever era o meio seguro para achar
    menos arduas as contrariedades incessantes que me acommettião. A esse
    sentimento unia-se o desejo de corresponder a espectativa de minha família e
    de meus chefes, cumprindo a risca as ordens que me haviam sido dadas.
    Incumbido de uma exploração importante n'uma zona de mais de cinquenta léguas,
    colhi os dados que ora apresento, procurando tomar notas minuciosas de tudo
    quanto pudesse interessar e coordenando-as desde logo, de modo que formassem
    com pouco custo um trabalho simples e despido de pretenções, porém de alguma
    vantagem para novos e mais habilitados exploradores, fornecendo-lhes apenas
    uma base para futuros desenvolvimentos.
- id: pt-br-biography-slow-cenas-de-viagem-10
  title: "Cenas de viagem"
  author: "Visconde de Taunay"
  source: "Project Gutenberg ebook #33611"
  source_url: https://www.gutenberg.org/ebooks/33611
  text: >
    Incumbido de uma exploração importante n'uma zona de mais de cinquenta léguas,
    colhi os dados que ora apresento, procurando tomar notas minuciosas de tudo
    quanto pudesse interessar e coordenando-as desde logo, de modo que formassem
    com pouco custo um trabalho simples e despido de pretenções, porém de alguma
    vantagem para novos e mais habilitados exploradores, fornecendo-lhes apenas
    uma base para futuros desenvolvimentos. Coube-me a felicidade de ter para
    companheiro n'essa viagem, o muito illustrado e digno engenheiro, o meu amigo
    Dr. Antonio Florencio Pereira do Lago, capitão d'estado-maior de 1^a classe,
    cujo espírito eminentemente methodico e cultivado e cuja intelligencia, ornada
    dos mais preciosos dotes da alma, vão-se tornando, felizmente para a nobre
    classe a que pertence, de dia em dia mais conhecidos.
