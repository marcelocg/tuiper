- id: pt-br-fantasy-fast-o-guarani-vol-1-1
  title: "O Guarani, Vol. 1"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67724"
  source_url: https://www.gutenberg.org/ebooks/67724
  text: >
    Para D. Antonio e para seus companheiros a quem ele havia imposto a sua
    fidelidade, esse torrão brasileiro, esse pedaço de sertão, não era senão um
    fragmento de Portugal livre, de sua patria primitiva; aí só se reconhecia como
    rei ao duque de Bragança, legítimo herdeiro da corôa; e quando se corrião as
    cortinas do docel da sala, as armas que se vião, eram as cinco quinas
    portuguezas, diante das quaes todas as frontes inclinavão. D. Antonio tinha
    cumprido o seu juramento de vassalo leal; e, com a consciência tranquilla por
    ter feito o seu dever, com a satisfação que dá ao homem o mando absoluto,
    ainda mesmo em um deserto, rodeado de seus companheiros que ele considerava
    amigos, vivia feliz no seio de sua pequena família.
- id: pt-br-fantasy-fast-o-guarani-vol-1-2
  title: "O Guarani, Vol. 1"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67724"
  source_url: https://www.gutenberg.org/ebooks/67724
  text: >
    Em resposta a esta ameaça, o índio empurrou desdenhosamente com a ponta do pé
    a clavina que estava atirada ao chão, como para exprimir que, se ele o
    quitasse, já teria abatido o tigre de um tiro. Os cavalleiros comprehendêrão o
    gesto, porque, além da precaução necessaria para o caso de algum ataque
    directo, não fizerão a menor demonstração offensiva. Como a principio, o índio
    havia dobrado um pouco os joelhos, e segurava na esquerda a longa forquilha,
    sua unica defeza; os olhos sempre fixos magnetisavão o animal. No momento em
    que o tigre se lançava, curvou-se ainda mais; e fugindo com o corpo apresentou
    o gancho. A fera, cahindo com a força do peso e a ligeireza do pulo, sentio o
    forcado cerrar-lhe o collo, e vacillou.
- id: pt-br-fantasy-fast-o-guarani-vol-1-3
  title: "O Guarani, Vol. 1"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67724"
  source_url: https://www.gutenberg.org/ebooks/67724
  text: >
    O peixe que beijava a flor da agua, e que podia ir ofender a moça; uma cobra
    verde innocente que se enroscava pelas folhas dos aguapés; um cameleão que se
    aquecia ao sol fazendo scintillar o seu prisma de côres brilhantes; um sagui
    branco e felpudo que se divertia a fazer caretas maliciosas suspendendo-se
    pela cauda ao galho de uma arvore; tudo quanto podia ir causar um susto a
    moça, o índio fazia fugir se estava longe e se estava perto pregava o animal
    immovel sobre o tronco ou sobre o chão. Se um ramo arrastado pela corrente
    passava, se um pouco do limo das aguas despegava-se da margem pedregosa do
    rio, se o fruto de uma sapucaia pendida sobre o _Paquequer_ estalava prestes
    a cahir, o índio, veloz como o tiro do seu arco lançava-se e retinha o coco no
    meio da sua quéda, ou precipitava-se n'agua e apanhava.
- id: pt-br-fantasy-fast-o-guarani-vol-1-4
  title: "O Guarani, Vol. 1"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67724"
  source_url: https://www.gutenberg.org/ebooks/67724
  text: >
    Esta ultima era uma bella índia, cuja posse se disputavam todos os guerreiros
    aymorés; seu pai, o chefe da tribu, sentia o orgulho de ter uma filha tão
    formosa, como a mais linda setta do seu arco, ou a mais vistosa penna do seu
    cocar. Cecilia havia dito uma palavra, e ele que não discutia os desejos de
    sua senhora, tomára o seu arco e sua clavina e se tinha posto a caminho.
    Chegava a um pequeno regato, quando um cãozinho felpudo sahio do matto, e logo
    depois uma índia que deo dois passos e cahio ferida por uma bala.
- id: pt-br-fantasy-fast-o-guarani-vol-2-5
  title: "O Guarani, Vol. 2"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67725"
  source_url: https://www.gutenberg.org/ebooks/67725
  text: >
    Quando acabou de cantar levantou-se, apanhou a flor de Peri que tinha atirado
    ao chão, deitou-a nos cabellos, e fazendo a sua oração da noite, adormeceu
    tranquillamente. O último pensamento que roçou a sua fronte alva foi um voto
    de gratidão pelo amigo que lhe salvára a vida naquella manhã. Depois um
    sorriso adejou sobre seu rosto gracioso, como se a alma durante o sono dos
    olhos viesse brincar nos lábios entreabertos. A menina balbuciou corando estas
    palavras: ia dizer que não fallaria ao cavalheiro e arrependeu-se; não queria
    revelar a Peri o que se tinha passado. Sabia que se o índio suspeitasse a
    scena da vespera, odiaria Isabel e Alvaro, só por lhe terem causado um pezar
    involuntario.
- id: pt-br-fantasy-fast-o-guarani-vol-2-6
  title: "O Guarani, Vol. 2"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67725"
  source_url: https://www.gutenberg.org/ebooks/67725
  text: >
    Pouco a pouco o dia foi rompendo; o arrebol da manhã desenhou-se no horizonte,
    tingindo as nuvens com todas as côres do prisma. O primeiro raio do sol,
    desprendendo-se daquelles vapores tenues e diaphanos, deslisou pelo azul do
    céo, e foi brincar no cabeço dos montes. Cecilia, com a frescura da manhã,
    tinha-se expandido como uma flor do campo; suas faces colorirão-se de novo,
    como se um raio do sol beijando-as lhes tivesse imprimido o seu reflexo
    roseado; os olhos brilhárão; e os lábios entreabrindo-se para aspirarem o ar
    puro e embalsamado da manhã, arqueárão-se graciosamente quase sorrindo.
- id: pt-br-fantasy-fast-o-guarani-vol-2-7
  title: "O Guarani, Vol. 2"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67725"
  source_url: https://www.gutenberg.org/ebooks/67725
  text: >
    --Não, Peri: o que me propões é impossível. D. Antonio de Mariz não pode
    abandonar a sua casa, a sua família e os seus amigos no momento do perigo,
    ainda mesmo para salvar aquillo que ele mais ama n'este mundo. Um fidalgo
    portuguez não pode fugir diante do inimigo, qualquer que ele seja; morre
    vingando a sua morte. Enquanto o espírito do fidalgo se debatia nessa luta
    cruel, Peri, de pé junto de Cecilia, parecia querer ainda protegê-la contra a
    morte inevitavel que a ameaçava. Dir-se-hia que o índio esperava algum
    soccorro imprevisto, algum milagre que salvasse sua senhora; e que aguardava o
    momento de fazer por ela tudo quanto fosse possível ao homem.
- id: pt-br-fantasy-fast-mist-rio-do-natal-8
  title: "Mistério do Natal"
  author: "Coelho Netto"
  source: "Project Gutenberg ebook #34750"
  source_url: https://www.gutenberg.org/ebooks/34750
  text: >
    A noite, profundamente escura e fria, atravessada de vento, atroava o fragor
    de ramagens estortegadas e d'aguas precipitosas que se despenhavam, aos
    jorros, pelos algares. Nas chans ainda o transito era fácil, sem o varejo da
    ventania que repulsava os caminhantes, como a impedir-lhes a marcha; mas nas
    gargantas, entre alcantis, as lufadas, abocando a entrada, esfusiavam
    desabridas, uivando com a furia de alcatéas famintas em ronda céva, a fariscar
    redis. A virgem reconheceu no anjo o mancebo que a saudára com as palavras
    mysteriosas, cuja promessa cumpria-se e José reviu o divino emissario que lhe
    aparecera em sonho, sob a figueira do horto, defendendo a innocencia de Maria,
    em cujo seio, cemo em corolla de flor, a Graça perpassava em genese
    immareavel, fecundando-o como o sol fecunda a leiva, eternamente pura.
- id: pt-br-fantasy-fast-mist-rio-do-natal-9
  title: "Mistério do Natal"
  author: "Coelho Netto"
  source: "Project Gutenberg ebook #34750"
  source_url: https://www.gutenberg.org/ebooks/34750
  text: >
    A virgem reconheceu no anjo o mancebo que a saudára com as palavras
    mysteriosas, cuja promessa cumpria-se e José reviu o divino emissario que lhe
    aparecera em sonho, sob a figueira do horto, defendendo a innocencia de Maria,
    em cujo seio, cemo em corolla de flor, a Graça perpassava em genese
    immareavel, fecundando-o como o sol fecunda a leiva, eternamente pura. Mas os
    trilhos, arenosos e pedrentos, eram apenas habitados pelo cardo que esgalhava
    os ramos espinhosos, abertos em feridas, feios, disformes como aleijões. Não
    se ouvia cantar um passaro--só o gypaeto atravessava o espaço fulgurante ou
    grandes aguias hostis, pousadas no cabeço das penhas, devassavam os arredores
    buscando o que prear.
- id: pt-br-fantasy-fast-mist-rio-do-natal-10
  title: "Mistério do Natal"
  author: "Coelho Netto"
  source: "Project Gutenberg ebook #34750"
  source_url: https://www.gutenberg.org/ebooks/34750
  text: >
    Ceruleo clarão refulgiu celestialmente. Coalharam-se os ares de aves, armas
    lampejaram em meneio heroico e toda a turba templaria formou no atrium, ergueu
    um sonoro louvor e rojou-se de bruços, com um tinir argentino de armillas e
    braceletes. E um homem alto, alado, com dois cornos de luz purpurea
    ardendo-lhe entre os cabellos crespos, surgiu no limiar de ouro estendendo
    amorosamente os braços a Maria extatica. Os khans succediam-se sempre
    abrigados em hortos frondosos, com a cisterna ao lado ou perto de alguma
    fonte, com a alpendrada reverdecida pela vinha, debaixo da qual os mercadores,
    que desciam de Tyro ou do Libano ou subiam de Joppé, comiam uma febra de anho
    regando-a com o vinho fresco de Engaddi, enquanto os dromedarios soltos iam e
    vinham vagarosamente ou deitados, ruminando, cerravam os olhos nostalgicos a
    vivida fulguração do sol.
