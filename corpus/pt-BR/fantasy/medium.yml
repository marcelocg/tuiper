- id: pt-br-fantasy-medium-ubirajara-lenda-tupi-1
  title: "Ubirajara: Lenda Tupi"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #38496"
  source_url: https://www.gutenberg.org/ebooks/38496
  text: >
    --O caraiba guiou teu passo ao encontro de Pojucan, o matador de gente,
    guerreiro chefe da terrível nação tocantim, que enche de terror as outras
    nações. Há três luas, desde que fujiram espavoridos os barbaros Tapuias, que
    Pojucan não combate; e seu tacape tem fome do inimigo. Tu não és digno dos
    golpes de um guerreiro chefe; mas Pojucan se compadece de tua mocidade e
    consente em combater comtigo. Terás a glória de ser morto pelo mais valente
    guerreiro tocantim. Os cantores de meus feitos lembrarão teu nome; e todos os
    mancebos de tua nação invejarão tua sorte.
- id: pt-br-fantasy-medium-ubirajara-lenda-tupi-2
  title: "Ubirajara: Lenda Tupi"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #38496"
  source_url: https://www.gutenberg.org/ebooks/38496
  text: >
    --Tu és igual na valentia e na força ao guerreiro chefe da nação tocantim. Mas
    Pojucan não consente que haja na terra quem resista a seu braço. É precizo que
    tu morras, Jaguarê, para que ele seja o primeiro dos guerreiros que o sol
    alumia. --Pojucan, matador de gente, guerreiro feroz da nação tocantim,
    Jaguarê deixou-te viver até este momento para saber se tu eras digno de
    dar-lhe um nome de guerra. Agora que te conhece como o primeiro dos guerreiros
    que existiram até este momento, ele quer que tua derrota seja a sua primeira
    façanha.
- id: pt-br-fantasy-medium-ubirajara-lenda-tupi-3
  title: "Ubirajara: Lenda Tupi"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #38496"
  source_url: https://www.gutenberg.org/ebooks/38496
  text: >
    --Camacan, tu és o primeiro guerreiro e o maior chefe da nação araguaia. Para
    a glória de Jaguarê bastava que ele se mostrasse teu filho no valor como é teu
    filho no sangue. Mas o grande arco da nação araguaia, Ubirajara não o recebe
    de ti e de nenhum outro guerreiro, pois o há de conquistar pela sua pujança.
    --A tristeza é amarga; quando entra no coração do guerreiro, o enche de fel.
    Mas Jandira fará como sua irmã, a abelha, ela fabricará em seus lábios os
    favos mais doces para seu guerreiro; suas palavras serão os fios de mel que
    ela derramará na alma do espozo.
- id: pt-br-fantasy-medium-ubirajara-lenda-tupi-4
  title: "Ubirajara: Lenda Tupi"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #38496"
  source_url: https://www.gutenberg.org/ebooks/38496
  text: >
    --Os araguaias receberam de seus avós o costume das nações que Tupã criou.
    Eles destinam ao prisioneiro a mais bela e a mais ilustre de todas as virjens
    da taba, para que ela conserve o sangue generozo do heróe inimigo e aumente a
    nobreza e o valor de sua nação. --Ubirajara é o grande chefe da nação
    araguaia; a sua voz cala-se a palavra dos anciãos; a seu gesto curva-se a
    fronte dos guerreiros; a sua vontade obedecem as tabas. Mas no amor de
    Jandira, ninguém manda, nem Tupã. Jandira é noiva de Ubirajara, e se ele não
    quizer aceital-a, o guanumbí a levará para os campos alegres onde repouzam as
    virjens que morreram.
- id: pt-br-fantasy-medium-ubirajara-lenda-tupi-5
  title: "Ubirajara: Lenda Tupi"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #38496"
  source_url: https://www.gutenberg.org/ebooks/38496
  text: >
    --Arací é a filha de minha velhice. A velhice é a idade da prudência e da
    sabedoria. O guerreiro que conquistar uma esposa como Arací terá a glória de
    gerar seu valor no seio da virtude. Itaquê não póde dezejar para seu hospede
    maior alegria. --Ubirajara não sabia que Pojucan era filho de Itaquê; pois ele
    nunca pizaria como hospede a cabana de um guerreiro, a quem tivesse decepado
    um filho. É precizo que recuperes a liberdade para que não se diga que
    Ubirajara surpreendeu a hospitalidade do grande chefe dos tocantins.
    --Ubirajara envia a Itaquê o resto da vingança. Este é Paan, o filho de
    Canicran. Ele te roubou a vista; mas não salvou o pai de tua mão terrível.
    Faze do corumim tapuia um mancebo tocantim; e ele será a luz de teus olhos e
    caminhará na frente do grande chefe para abrir-lhe o caminho da guerra.
- id: pt-br-fantasy-medium-o-guarani-vol-1-6
  title: "O Guarani, Vol. 1"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67724"
  source_url: https://www.gutenberg.org/ebooks/67724
  text: >
    Dir-se-hia que vassalo e tributário desse rei das aguas, o pequeno rio,
    altivo e sobranceiro contra os rochedos, curva-se humildemente aos pés do
    suzerano. Perde então a belleza selvatica; suas ondas são calmas e serenas
    como as de um lago, e não se revoltão contra os barcos e as canôas que
    resvalão sobre elas: escravo submisso, soffre o latego do senhor. Aí, o
    _Paquequer_ lança-se rápido sobre o seu leito, e atravessa as florestas como o
    tapir, espumando, deixando o pelo esparso pelas pontas de rochedo, e enchendo
    a solidão com o estampido de sua carreira. De repente, falta-lhe o espaço,
    foge-lhe a terra; o soberbo rio recúa um momento para concentrar as suas
    forças e precipita-se de um só arremesso, como o tigre sobre a presa.
- id: pt-br-fantasy-medium-o-guarani-vol-1-7
  title: "O Guarani, Vol. 1"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67724"
  source_url: https://www.gutenberg.org/ebooks/67724
  text: >
    Aí, o _Paquequer_ lança-se rápido sobre o seu leito, e atravessa as florestas
    como o tapir, espumando, deixando o pelo esparso pelas pontas de rochedo, e
    enchendo a solidão com o estampido de sua carreira. De repente, falta-lhe o
    espaço, foge-lhe a terra; o soberbo rio recúa um momento para concentrar as
    suas forças e precipita-se de um só arremesso, como o tigre sobre a presa.
    Descendo dois ou três dos largos degraus de pedra da escada, encontrava-se uma
    ponte de madeira solidamente construida sobre uma fenda larga e profunda que
    se abria na rocha. Continuando a descer, chegava-se a beira do rio, que se
    curvava em seio gracioso; sombreado pelas grandes gameleiras e angelins que
    crescião ao longo das margens.
- id: pt-br-fantasy-medium-o-guarani-vol-1-8
  title: "O Guarani, Vol. 1"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67724"
  source_url: https://www.gutenberg.org/ebooks/67724
  text: >
    Descendo dois ou três dos largos degraus de pedra da escada, encontrava-se uma
    ponte de madeira solidamente construida sobre uma fenda larga e profunda que
    se abria na rocha. Continuando a descer, chegava-se a beira do rio, que se
    curvava em seio gracioso; sombreado pelas grandes gameleiras e angelins que
    crescião ao longo das margens. A primeira vista, olhando esse rochedo da
    altura de duas braças, donde se precipitava um arroio da largura de um copo
    d'agua, e o monte de grama, que tinha quando muito o tamanho de um divan,
    parecia que a natureza se havia feito menina, e se esmerara em crear por
    capricho uma miniatura.
- id: pt-br-fantasy-medium-o-guarani-vol-1-9
  title: "O Guarani, Vol. 1"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67724"
  source_url: https://www.gutenberg.org/ebooks/67724
  text: >
    A primeira vista, olhando esse rochedo da altura de duas braças, donde se
    precipitava um arroio da largura de um copo d'agua, e o monte de grama, que
    tinha quando muito o tamanho de um divan, parecia que a natureza se havia
    feito menina, e se esmerara em crear por capricho uma miniatura. Finalmente,
    na extrema do pequeno jardim, a beira do precipicio, via-se uma cabana de
    sapé, cujos esteios eram duas palmeiras que haviam nascido entre as fendas das
    pedras. As abas do tecto descião até o chão: um ligeiro sulco privava as aguas
    da chuva de entrar nesta habitação selvagem.
- id: pt-br-fantasy-medium-o-guarani-vol-1-10
  title: "O Guarani, Vol. 1"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67724"
  source_url: https://www.gutenberg.org/ebooks/67724
  text: >
    Finalmente, na extrema do pequeno jardim, a beira do precipicio, via-se uma
    cabana de sapé, cujos esteios eram duas palmeiras que haviam nascido entre as
    fendas das pedras. As abas do tecto descião até o chão: um ligeiro sulco
    privava as aguas da chuva de entrar nesta habitação selvagem. Sobre a porta do
    centro desenhava-se um brasão d'armas em campo de cinco vieiras de ouro,
    riscadas em cruz entre quatro rosas de prata sobre pallas e faixas. No escudo,
    formado por uma brica de prata, orlada de vermelho, via-se um elmo também de
    prata paquife de ouro e de azul, e por timbre um meio leão de azul com uma
    vieira de ouro sobre a cabeça.
