- id: pt-br-fantasy-slow-iracema-1
  title: "Iracema"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67740"
  source_url: https://www.gutenberg.org/ebooks/67740
  text: >
    Os meninos brincam na sombra do outão, com pequenos ossos de rezes, que
    figuram a boiada. Era assim que eu brincava, há quantos anos, em outro sítio,
    não muito distante do seu. A dona da casa terna e incansavel manda abrir o
    côco verde, ou prepara o saboroso creme do burity para refrigerar o esposo,
    que pouco há recolheu de sua excursão pelo sítio, e agora repousa embalando-se
    na macia e commoda rêde. Talvez me desvaneça amor do ninho, ou se illudam as
    reminiscencias da infancia avivadas recentemente. Senão, creio que ao abrir o
    pequeno volume, sentirá uma onda do mesmo aroma silvestre e bravio que lhe vem
    da varzea. Derrama-o a briza que perpassou os espathos da carnauba e a ramagem
    das aroeiras em flor.
- id: pt-br-fantasy-slow-iracema-2
  title: "Iracema"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67740"
  source_url: https://www.gutenberg.org/ebooks/67740
  text: >
    O sentimento que ele pôz nos olhos e no rosto, não sei eu. Porém a virgem
    lançou de si o arco e a uiraçaba, e correu para o guerreiro, sentida da magoa
    que causara. A mão que rapida ferira, estancou mais rapida e compassiva o
    sangue que gotejava. Depois Iracema quebrou a flecha homicida: deu a haste ao
    desconhecido, guardando comsigo a ponta farpada. O ancião fumava a porta,
    sentado na esteira de carnaúba, meditando os sagrados ritos de Tupã. O tenue
    sôpro da brisa carmeava, como frocos de algodão, os compridos e raros cabellos
    brancos. De immovel que estava, sumia a vida nos olhos cavos e nas rugas
    profundas.
- id: pt-br-fantasy-slow-iracema-3
  title: "Iracema"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67740"
  source_url: https://www.gutenberg.org/ebooks/67740
  text: >
    --O Pagé dorme porque já Tupã voltou o rosto para a terra e a luz correu os
    máus espíritos da treva. Mas o sono é leve nos olhos de Araken, como o fumo
    do sapé no cocuruto da serra. Se o extrangeiro veio para o Pagé, fale; seu
    ouvido escuta. O seio da filha de Araken arfou, como o ésto da vaga que se
    franja de espuma, e soluçou. Mas sua alma, negra de tristura, teve ainda um
    pállido reflexo para illuminar a sêcca flor das faces. Assim em noite escura
    vem um fogo fatuo luzir as brancas areias do taboleiro.
- id: pt-br-fantasy-slow-iracema-4
  title: "Iracema"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67740"
  source_url: https://www.gutenberg.org/ebooks/67740
  text: >
    Quando veio a manhã, ainda achou Iracema ali debruçada, qual borboleta que
    dormiu no seio do formoso cacto. Em seu lindo semblante accendia o pejo vivos
    rubores; e como entre os arrebões da manhã scintilla o primeiro raio do sol,
    em suas faces incendidas rutilava o primeiro sorriso da esposa, aurora de
    fruido amor. Martim seguiu silencioso a virgem, que fugia entre as arvores,
    como a selvagem acoty. A tristeza lhe roia o coração; mas a onda de perfumes
    que deixava na brisa a passagem da formosa tabajara, açulava o amor no seio do
    guerreiro. Seu passo era tardo, o peito lhe offegava.
- id: pt-br-fantasy-slow-iracema-5
  title: "Iracema"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #67740"
  source_url: https://www.gutenberg.org/ebooks/67740
  text: >
    O cristão, seguindo pela margem do rio, escolheu o lugar para levantar a
    cabana. Poty cortou esteios dos troncos da carnaúba; a filha de Araken ligava
    os leques da palmeira para vestir o tecto e as paredes: Martim cavou a terra
    com a espada e fabricou a porta das fasquias da taquára. --Antes que o pai de
    Jacaúna e Poty, o valente guerreiro Jatobá, mandasse a todos os guerreiros
    pytiguaras, o grande tacape da nação estava na dextra de Batuireté, o maior
    chefe, pai de Jatobá. Foi ele que veio pelas praias do mar até o rio do
    jaguar, e expulsou os tabajaras para dentro das terras, marcando a cada tribu
    seu lugar; depois entrou pelo sertão até a serra que tomou seu nome.
- id: pt-br-fantasy-slow-ubirajara-lenda-tupi-6
  title: "Ubirajara: Lenda Tupi"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #38496"
  source_url: https://www.gutenberg.org/ebooks/38496
  text: >
    --Guerreiro araguaia, pois vejo pela pena vermelha de teu cocar que pertences
    a essa nação valente; se pizas os campos dos Tocantins como hospede, bem vindo
    sejas; mas se vens como inimigo, foje, para que tua mãi não chore a morte de
    seu filho e tenha quem a proteja na velhice. --A filha dos Tocantins tem no pé
    as asas do beija-flor; mas a seta de Jaguarê voa como o gavião. Não te
    assustes, virgem das florestas; tua formosura venceu o impeto de meu braço e
    apagou a cólera no coração feroz do caçador. Feliz o guerreiro que te possuir.
- id: pt-br-fantasy-slow-ubirajara-lenda-tupi-7
  title: "Ubirajara: Lenda Tupi"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #38496"
  source_url: https://www.gutenberg.org/ebooks/38496
  text: >
    --A filha dos Tocantins tem no pé as asas do beija-flor; mas a seta de Jaguarê
    voa como o gavião. Não te assustes, virgem das florestas; tua formosura venceu
    o impeto de meu braço e apagou a cólera no coração feroz do caçador. Feliz o
    guerreiro que te possuir. --Eu sou Arací, a estrela do dia, filha de Itaquê,
    pai da grande nação Tocantim. Cem dos melhores guerreiros o servem em sua
    cabana para merecer que ele o escolha por filho. O mais forte e valente me
    terá por esposa. Vem comigo, guerreiro araguaia; excede aos outros no trabalho
    e na constancia, e tu romperás a liga de Arací na próxima lua do amor.
- id: pt-br-fantasy-slow-ubirajara-lenda-tupi-8
  title: "Ubirajara: Lenda Tupi"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #38496"
  source_url: https://www.gutenberg.org/ebooks/38496
  text: >
    --Eu sou Arací, a estrela do dia, filha de Itaquê, pai da grande nação
    Tocantim. Cem dos melhores guerreiros o servem em sua cabana para merecer que
    ele o escolha por filho. O mais forte e valente me terá por esposa. Vem
    comigo, guerreiro araguaia; excede aos outros no trabalho e na constancia, e
    tu romperás a liga de Arací na próxima lua do amor. --Não, filha do sol;
    Jaguarê não deixou a taba de seus pais, onde Jandira lhe guarda o seio de
    esposa, para ser escravo da virgem. Ele vem combater e ganhar um nome de
    guerra que encha de orgulho a sua nação. Torna a taba dos Tocantins e dize aos
    cem guerreiros cativos de teu amor, que Jaguarê, o mais destemido dos
    caçadores araguaias, os dezafia ao combate.
- id: pt-br-fantasy-slow-ubirajara-lenda-tupi-9
  title: "Ubirajara: Lenda Tupi"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #38496"
  source_url: https://www.gutenberg.org/ebooks/38496
  text: >
    --Não, filha do sol; Jaguarê não deixou a taba de seus pais, onde Jandira lhe
    guarda o seio de esposa, para ser escravo da virgem. Ele vem combater e ganhar
    um nome de guerra que encha de orgulho a sua nação. Torna a taba dos Tocantins
    e dize aos cem guerreiros cativos de teu amor, que Jaguarê, o mais destemido
    dos caçadores araguaias, os dezafia ao combate. --Eu sou Jaguarê, filho de
    Camacan, chefe da valente nação dos araguaias, que vem de longe em busca da
    terra de seus pais. Minha fama corre as tabas e tu já deves conhecer o maior
    caçador das florestas. Mas Jaguarê despreza a fama de caçador; ele quer um
    nome de guerra, que diga às nações a força de seu braço e faça tremer aos mais
    bravos. Se tua nação te aclamou forte entre os fortes, prepara-te para morrer;
    se não, passa teu caminho.
- id: pt-br-fantasy-slow-ubirajara-lenda-tupi-10
  title: "Ubirajara: Lenda Tupi"
  author: "José de Alencar"
  source: "Project Gutenberg ebook #38496"
  source_url: https://www.gutenberg.org/ebooks/38496
  text: >
    --Eu sou Jaguarê, filho de Camacan, chefe da valente nação dos araguaias, que
    vem de longe em busca da terra de seus pais. Minha fama corre as tabas e tu já
    deves conhecer o maior caçador das florestas. Mas Jaguarê despreza a fama de
    caçador; ele quer um nome de guerra, que diga às nações a força de seu braço e
    faça tremer aos mais bravos. Se tua nação te aclamou forte entre os fortes,
    prepara-te para morrer; se não, passa teu caminho, guerreiro vil, para que o
    sangue do fraco não manche o tacape virgem de Jaguarê.
