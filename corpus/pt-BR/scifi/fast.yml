- id: pt-br-scifi-fast-pap-is-avulsos-1
  title: "Papéis Avulsos"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #57001"
  source_url: https://www.gutenberg.org/ebooks/57001
  text: >
    --Essa é publicidade constante, barata, fácil, de todos os dias; mas há outra.
    Qualquer que seja a teoria das artes, é fora de dúvida que o sentimento da
    família, a amizade pessoal e a estima publica instigam a reproducção das
    feições de um homem amado ou benemerito. Nada obsta a que sejas objecto de uma
    tal distincção, principalmente se a sagacidade dos amigos não achar em ti
    repugnancia. Em semelhante caso, não só as regras da mais vulgar polidez
    mandam aceitar o retrato ou o busto, como seria desasado impedir que os amigos
    o expuzessem em qualquer casa publica. Dessa maneira o nome fica ligado a
    pessoa; os que houverem lido o teu recente discurso (supponhamos) na sessão
    inaugural da União dos Cabellereiros, reconhecerão na compostura das feições o
    autor dessa obra grave, em que a «alavanca do progresso» e o «suor do
    trabalho», vencem as «fauces hiantes» da miseria..
- id: pt-br-scifi-fast-pap-is-avulsos-2
  title: "Papéis Avulsos"
