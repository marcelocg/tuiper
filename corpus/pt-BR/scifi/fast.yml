  text: >
    9.--E Sem falou a voz de seu coração, dizendo:--«Meu pai tem a sua família;
    cada um de nós tem a sua família; a terra é de sobra; podiamos viver em tendas
    separadas. Cada um de nós fará o que lhe parecer melhor: e plantará, caçará,
    ou lavrará a madeira, ou fiará o linho.» 10.--E respondeu Japhet:--«Acho bem
    lembrada a idea de Sem; podemos viver em tendas separadas. A arca vai descer
    ao cabeço de uma montanha; meu pai e Chain descerão para o lado do nascente:
    eu e Sem para o lado do poente. Sem ocupará duzentos covados de terra, eu
    outros duzentos.»
- id: pt-br-scifi-fast-hist-rias-sem-data-3
  title: "Histórias Sem Data"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #33056"
  source_url: https://www.gutenberg.org/ebooks/33056
  text: >
    «DIOGO VILLARES.--Tenho-me referido muitas vezes a este amigo, e fal-o-hei
    algumas outras mais, se ele me não matar de tedio, coisa em que o reputo
    profissional. Pediu-me há anos que lhe arranjasse um emprego, e arranjei-lh'o.
    Não me avisou da moeda em que me pagaria. Que singular gratidão! Chegou ao
    excesso de compor um soneto e publical-o. Fallava-me do obsequio a cada passo,
    dava-me grandes nomes; emfim, acabou. Mais tarde relacionámo-nos intimamente.
    Conheci-o então ainda melhor. _C'est le genre ennuyeux._ Não é mau parceiro de
    voltarete. Dizem-me que não deve nada a ninguém. Bom pai de família. Estupido
    e credulo. Com intervallo de quatro dias, já lhe ouvi dizer de um ministerio
    que era excelente e detestavel:--differença dos interlocutores. Ri muito e
    mal. Toda a gente, quando o vê pela primeira vez, começa por suppol-o um varão
    grave; no segundo dia dá-lhe piparotes. A razão é a figura, ou, mais.
- id: pt-br-scifi-fast-hist-rias-sem-data-4
  title: "Histórias Sem Data"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #33056"
  source_url: https://www.gutenberg.org/ebooks/33056
  text: >
    --Vou demonstrar que não só é possível, mas até legítimo e necessário. As
    prisões egypicias estão cheias de criminosos, e os criminosos ocupam, na
    escala humana, um grau muito inferior. Já não são cidadãos, nem mesmo se podem
    dizer homens, porque a razão e a virtude, que são os dois principaes
    caracteristicos humanos, eles os perderam, infringindo a lei e a moral. Além
    d'isso, uma vez que têm de expiar com a morte os seus crimes, não é justo que
    prestem algum serviço a verdade e a ciência? A verdade é immortal; ela vale
    não só todos os ratos, como todos os delinquentes do universo.
- id: pt-br-scifi-fast-mem-rias-p-stumas-de-br-s-cubas-5
  title: "Memórias Póstumas de Brás Cubas"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #54829"
  source_url: https://www.gutenberg.org/ebooks/54829
  text: >
    Que, no alto do principal de seus livros, confessasse Stendhal havel-o escrito
    para cem leitores, coisa é que admira e consterna. O que não admira, nem
    provavelmente consternará é se este outro livro não tiver os cem leitores de
    Stendhal, nem cinquenta, nem vinte, e quando muito, dez. Dez? Talvez cinco.
    Trata-se, na verdade, de uma obra diffusa, na qual eu, Braz Cubas, se adoptei
    a fórma livre de um Sterne, de um Lamb, ou de um de Maistre, não sei se lhe
    metti algumas rabugens de pessimismo. Póde ser. Obra de finado. Escrevi-a com
    a penna da galhofa e a tinta da melancolia; e não é difícil antever o que
    poderá sair desse connubio. Accresce que a gente grave achará no livro umas
    apparencias de puro romance, ao passo que a gente frivola não achará nelle o
    seu romance usual; e eil-o aí fica privado da estima dos graves.
- id: pt-br-scifi-fast-mem-rias-p-stumas-de-br-s-cubas-6
  title: "Memórias Póstumas de Brás Cubas"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #54829"
  source_url: https://www.gutenberg.org/ebooks/54829
  text: >
    E a imaginação dela, como as cegonhas que um ilustre viajante viu desferirem
    o voo desde o Illysso às ribas africanas, sem embargo das ruinas e dos
    tempos,--a imaginação dessa senhora também voou por sobre os destroços
    presentes até às ribas de uma Africa juvenil... Deixal-a ir; lá iremos mais
    tarde; lá iremos quando eu me restituir aos primeiros anos. Agora, quero
    morrer tranquillamente, methodicamente, ouvindo os soluços das damas, as
    fallas baixas dos homens, a chuva que tamborila nas folhas de tinhorão da
    chacara, e o som estridulo de uma navalha que um amolador está afiando lá
    fora, a porta de um correeiro. Juro-lhes que essa orchestra da morte foi muito
    menos triste do que podia parecer; e de certo ponto em diante chegou a ser
    deliciosa. A vida estrebuchava-me no peito, com uns impetos de vaga marinha,
    esvaia-se-me a consciencia, eu descia a immobilidade fysica e moral, e.
- id: pt-br-scifi-fast-mem-rias-p-stumas-de-br-s-cubas-7
  title: "Memórias Póstumas de Brás Cubas"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #54829"
  source_url: https://www.gutenberg.org/ebooks/54829
  text: >
    Caiu do ar? destacou-se da terra? não sei; sei que um vulto immenso, uma
    figura de mulher me apareceu então, fitando-me uns olhos rutilantes como o
    sol. Tudo nessa figura tinha a vastidão das fórmas selvaticas, e tudo escapava
    a comprehensão do olhar humano, porque os contornos perdiam-se no ambiente, e
    o que parecia espesso era muita voz diaphano. Estupefacto, não disse nada, não
    cheguei sequer a soltar um grito; mas, ao cabo de algum tempo, que foi breve,
    perguntei quem era e como se chamava; curiosidade de delirio. --Sim, verme, tu
    vives. Não receies perder esse andrajo que é teu orgulho; provarás ainda, por
    algumas horas, o pão da dôr e o vinho da miseria. Vives: agora mesmo que
    ensandeceste, vives; e se a tua consciência rehouver um instante de
    sagacidade, tu dirás que queres viver.
- id: pt-br-scifi-fast-mem-rias-p-stumas-de-br-s-cubas-8
  title: "Memórias Póstumas de Brás Cubas"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #54829"
  source_url: https://www.gutenberg.org/ebooks/54829
  text: >
    Marcella suspirou com tristeza. A verdade é que eu me sentia pungido e
    aborrecido, ao mesmo tempo, e anciava por me ver fora daquella casa. Marcella,
    entretanto, chamou um moleque, deu-lhe o relogio, e, apezar da minha
    opposição, mandou-o, a uma loja na visinhança, comprar o vidro. Não havia
    remedio; sentei-me outra vez. Disse ela então que desejava ter a protecção dos
    conhecidos de outro tempo; ponderou que mais tarde ou mais cedo era natural
    que me casasse, e afiançou que me daria finas joias por preços baratos. Não
    disse _preços baratos_, mas usou uma metaphora delicada e transparente. Entrei
    a desconfiar que não padecera nenhum desastre (salvo a molestia), que tinha o
    dinheiro a bom recado, e que negociava com o unico fim de acudir a paixão do
    lucro, que era o verme roedor daquella existencia; foi isso mesmo que me
    disseram depois.
- id: pt-br-scifi-fast-mem-rias-p-stumas-de-br-s-cubas-9
  title: "Memórias Póstumas de Brás Cubas"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #54829"
  source_url: https://www.gutenberg.org/ebooks/54829
  text: >
    De noite, no dia seguinte, em toda aquela semana pensei o menos que pude nos
    cinco contos, e até confesso que os deixei muito quietinhos na gaveta da
    secretaria. Gostava de falar de todas as coisas, menos de dinheiro, e
    principalmente de dinheiro achado; e todavia não era crime achar dinheiro, era
    uma felicidade, um bom acaso, era talvez um lance da Providencia. Não podia
    ser outra coisa. Não se perdem cinco contos, como se perde um lenço de tabaco.
    Cinco contos levam-se com trinta mil sentidos, apalpam-se a miudo, não se lhes
    tiram os olhos de cima, nem as mãos, nem o pensamento, e para se perderem
    assim tolamente, n'uma praia, é necessário que... Crime é que não podia ser o
    achado; nem crime, nem deshonra, nem nada que embaciasse o caracter de um
    homem. Era um achado, um acerto feliz, como a sorte grande, como as apostas
    de.
- id: pt-br-scifi-fast-pap-is-avulsos-10
  title: "Papéis Avulsos"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #57001"
  source_url: https://www.gutenberg.org/ebooks/57001
  text: >
    D. Benedicta achou a reflexão judiciosa, e guardou o dinheiro. A filha sorriu
    para dentro. Talvez repetisse comsigo a famosa palavra da janella:--Isto
    acaba. A mãe foi cuidar dos arranjos, escolha de roupa, lista das coisas que
    precisava comprar, um presente para o marido, etc. Ah! que alegria que ele ia
    ter! Depois do meio dia sairam para fazer encommendas, visitas, comprar as
    passagens, quatro passagens; levavam uma escrava comsigo. Eulalia ainda tentou
    arredal-a da ideia, propondo a transferencia da viajem; mas D. Benedicta
    declarou peremptoriamente que não. No escriptorio da Companhia de Paquetes
    disseram-lhe que o do Norte saia na sexta-feira da outra semana. Ela pediu as
    quatro passagens; abriu a carteirinha, tirou uma nota, depois duas, refletiu
    um instante.
