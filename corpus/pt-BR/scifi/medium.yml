- id: pt-br-scifi-medium-pap-is-avulsos-1
  title: "Papéis Avulsos"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #57001"
  source_url: https://www.gutenberg.org/ebooks/57001
  text: >
    D. Evarista sentiu faltar-lhe o chão debaixo dos pés. Nunca dos nuncas vira o
    Rio de Janeiro, que posto não fosse sequer uma pálida sombra do que hoje é,
    todavia era alguma coisa mais do que Itaguahy. Ver o Rio de Janeiro, para ela,
    equivalia ao sonho do hebreu captivo. Agora, principalmente, que o marido
    assentára de vez naquella povoação interior, agora é que ela perdera as
    últimas esperanças de respirar os ares da nossa boa cidade; e justamente agora
    é que ele a convidava a realisar os seus desejos de menina e moça. D. Evarista
    não pôde dissimular o gosto de semelhante proposta. Simão Bacamarte pegou-lhe
    na mão e sorriu,--um sorriso tanto ou quanto filosophico, além de conjugal, em
    que parecia traduzir-se este pensamento:--«Não há remedio certo para as dôres
    da alma; esta senhora definha, porque lhe parece que a não amo; dou-lhe o Rio
    de Janeiro, e consola-se.».
- id: pt-br-scifi-medium-pap-is-avulsos-2
  title: "Papéis Avulsos"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #57001"
  source_url: https://www.gutenberg.org/ebooks/57001
  text: >
    Sobre o lábio fino e discreto do alienista roçou a vaga sombra de uma intenção
    de riso, em que o desdém vinha casado a commiseração; mas nenhuma palavra
    sahiu de suas egregias entranhas. A ciência contentou-se em estender a mão a
    theologia,--com tal segurança, que a theologia não soube emfim se devia crêr
    em si ou na outra. Itaguahy e o universo ficavam a beira de uma revolução.
    Costa era um dos cidadãos mais estimados de Itaguahy. Herdára quatrocentos mil
    cruzados em boa moeda de el-rei D. João V, dinheiro cuja renda bastava,
    segundo lhe declarou o tio no testamento, para viver «até o fim do mundo.» Tão
    depressa recolheu a herança, como entrou a dividil-a em emprestimos, sem
    usura, mil cruzados a um, dois mil a outro, trezentos a este, oitocentos
    áquelle, a tal ponto que, no fim de cinco anos, estava sem nada, Se a miseria
    viesse de.
- id: pt-br-scifi-medium-pap-is-avulsos-3
  title: "Papéis Avulsos"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #57001"
  source_url: https://www.gutenberg.org/ebooks/57001
  text: >
    O vigario derreou os cantos da boca, a maneira de quem não sabe nada, ou não
    quer dizer tudo; resposta vaga, que se não póde repetir a outra pessoa, por
    falta de texto. D. Evarista achou realmente extraordinario que toda aquela
    gente ensandecesse; um ou outro, vá; mas todos? Entretanto, custava-lhe
    duvidar; o marido era um sabio, não recolheria ninguém a Casa Verde sem prova
    evidente de loucura. Tres horas depois, cerca de cinquenta convivas
    sentavam-se em volta da mesa de Simão Bacamarte; era o jantar das boas-vindas.
    D. Evarista foi o assumpto obrigado dos brindes, discursos, versos de toda a
    casta, metaphoras, amplificações, apologos. Ela era a esposa do novo
    Hippocrates, a musa da ciência, anjo, divina, aurora, caridade, vida,
    consolação; trazia nos olhos duas estrellas, segundo a versão modesta de
    Crispim Soares, e dois sóes, no conceito de um vereador. O alienista ouvia
    essas coisas um tanto enfastiado.
- id: pt-br-scifi-medium-pap-is-avulsos-4
  title: "Papéis Avulsos"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #57001"
  source_url: https://www.gutenberg.org/ebooks/57001
  text: >
    O alienista caminhou para a varanda da frente, e chegou ali no momento em que
    a rebelião também chegava e parava, defronte, com as suas trezentas cabeças
    rutilantes de civismo e sombrias de desespero.--Morra! morra! bradaram de
    todos os lados, apenas o vulto do alienista assomou na varanda. Simão
    Bacamarte fez um signal pedindo para falar; os revoltosos cobriram-lhe a voz
    com brados de indignação. Então, o barbeiro agitando o chapéo, afim de impôr
    silencio a turba, conseguiu aquietar os amigos, e declarou ao alienista que
    podia falar, mas accrescentou que não abusasse da paciencia, do povo como
    fizera até então.
- id: pt-br-scifi-medium-pap-is-avulsos-5
  title: "Papéis Avulsos"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #57001"
  source_url: https://www.gutenberg.org/ebooks/57001
  text: >
    Dentro de cinco dias, o alienista meteu na Casa Verde cerca de cinquenta
    aclamadores do novo governo. O povo indignou-se. O governo, atarantado, não
    sabia reagir. João Pina, outro barbeiro, dizia abertamente nas ruas, que o
    Porfirio estava «vendido ao ouro de Simão Bacamarte,» frase que congregou em
    torno de João Pina a gente mais resoluta da vila. Porfirio, vendo o antigo
    rival da navalha a testa da insurreição, comprehendeu que a sua perda era
    irremediavel, se não désse um grande golpe; expediu dois decretos, um abolindo
    a Casa Verde, outro desterrando o alienista. João Pina mostrou claramente, com
    grandes frases, que o acto de Porfirio era um simples apparato, um engodo, em
    que o povo não devia crer. Duas horas depois cahia Porfirio ignominiosamente,
    e João Pina assumia a difícil tarefa do governo. Como achasse nas gavetas as
    minutas da proclamação, da exposição ao vice-rei e de outros actos.
- id: pt-br-scifi-medium-pap-is-avulsos-6
  title: "Papéis Avulsos"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #57001"
  source_url: https://www.gutenberg.org/ebooks/57001
  text: >
    Os alienados foram alojados por classes. Fez-se uma galeria de modestos, isto
    é, os loucos em quem predominava esta perfeição moral; outra de tolerantes,
    outra de veridicos, outra de simplices, outra de leaes, outra de magnanimos,
    outra de sagazes, outra de sinceros, etc. Naturalmente, as famílias e os
    amigos dos reclusos bradavam contra a teoria; e alguns tentaram compellir a
    camara a cassar a licença. A camara, porém, não esquecera a linguagem do
    vereador Galvão, e se cassasse a licença, vel-o-hia na rua, e restituido ao
    lugar; pelo que, recusou. Simão Bacamarte oficiou aos vereadores, não
    agradecendo, mas felicitando-os por esse acto de vingança pessoal.
- id: pt-br-scifi-medium-hist-rias-sem-data-7
  title: "Histórias Sem Data"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #33056"
  source_url: https://www.gutenberg.org/ebooks/33056
  text: >
    Não se deteve um instante. O pasmo não lhe deu tempo de refletir, comparar e
    concluir do espetáculo presente alguma coisa análoga ao passado. Voou de novo
    ao céu, tremulo de raiva, ancioso de conhecer a causa secreta de tão singular
    fenomeno. Deus ouviu-o com infinita complacencia; não o interrompeu, não o
    reprehendeu, não triumphou, sequer, d'aquela agonia satanica. Poz os olhos
    n'ele, e disse-lhe: Não me perguntem pela família do Dr. Jeremias Halma, nem o
    que e que ele veio fazer ao Rio de Janeiro, n'aquele ano de 1768, governando o
    Conde de Azambuja, que a principio se disse o mandára buscar; esta versão
    durou pouco. Veio, ficou e morreu com o século. Posso affirmar que era médico
    e hollandez. Viajára muito, sabia toda a chimica do tempo, e mais alguma;
    falava correntemente cinco ou seis linguas vivas e duas mortas. Era tão
    universal e inventivo, que dotou a.
- id: pt-br-scifi-medium-hist-rias-sem-data-8
  title: "Histórias Sem Data"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #33056"
  source_url: https://www.gutenberg.org/ebooks/33056
  text: >
    Logo foi o debate; nenhuma opinião chegava a concertar os espíritos. Uns
    inclinavam-se a demanda, outros a espera, não poucos aceitavam o alvitre de
    consultar o Dr. Jeremias. Cinco ou seis partidarios d'este parecer não o
    defendiam senão com a intenção secreta e disfarçada de não fazer coisa
    nenhuma; eram os servos do medo e da esperanca. O cabelleireiro
    oppunha-se-lhe, e perguntava que molestia haveria que impedisse um homem de
    pagar o que deve. Mas o Matta-sapateiro:--«Sr. compadre, nos não entendemos
    d'esses negocios; lembre-se que o doutor é estrangeiro, e que nas terras
    estrangeiras sabem coisas que nunca lembraram ao diabo. Em todo caso, só
    perdemos algum tempo e nada mais.» Venceu este parecer; deputaram o sapateiro,
    o alfaiate e o cabelleireiro para entenderem-se com o Dr. Jeremias, em nome de
    todos, e o conciliabulo dissolveu-se na patuscada. Terpsychore bracejou e
    perneou diante d'eles as suas graças jocundas, e tanto.
- id: pt-br-scifi-medium-mem-rias-p-stumas-de-br-s-cubas-9
  title: "Memórias Póstumas de Brás Cubas"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #54829"
  source_url: https://www.gutenberg.org/ebooks/54829
  text: >
    Caiu do ar? destacou-se da terra? não sei; sei que um vulto immenso, uma
    figura de mulher me apareceu então, fitando-me uns olhos rutilantes como o
    sol. Tudo nessa figura tinha a vastidão das fórmas selvaticas, e tudo escapava
    a comprehensão do olhar humano, porque os contornos perdiam-se no ambiente, e
    o que parecia espesso era muita voz diaphano. Estupefacto, não disse nada, não
    cheguei sequer a soltar um grito; mas, ao cabo de algum tempo, que foi breve,
    perguntei quem era e como se chamava; curiosidade de delirio. --Sim, verme, tu
    vives. Não receies perder esse andrajo que é teu orgulho; provarás ainda, por
    algumas horas, o pão da dôr e o vinho da miseria. Vives: agora mesmo que
    ensandeceste, vives; e se a tua consciência rehouver um instante de
    sagacidade, tu dirás que queres viver.
- id: pt-br-scifi-medium-mem-rias-p-stumas-de-br-s-cubas-10
  title: "Memórias Póstumas de Brás Cubas"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #54829"
  source_url: https://www.gutenberg.org/ebooks/54829
  text: >
    Vai então, empacou o jumento em que eu vinha montado; fustiguei-o, ele deu
    dois corcovos, depois mais três, emfim mais um, que me sacudiu fora da sella,
    e com tal desastre, que o pé esquerdo me ficou preso no estribo; tento
    agarrar-me ao ventre do animal, mas já então, espantado, disparou pela estrada
    fora. Digo mal: tentou disparar, e efeitivamente deu dois saltos, mas um
    almocreve, que ali estava, acudiu atempo de lhe pegar na redea e detel-o, não
    sem esforço nem perigo. Dominado o bruto, desvencilhei-me do estribo e puz-me
    de pé. E era verdade; se o jumento corre por ali fora, contundia-me devéras, e
    não sei se a morte não estaria no fim do desastre; cabeça partida, uma
    congestão, qualquer transtorno cá dentro; e lá se me ia a bacharelice em flor.
    O almocreve salvara-me talvez a vida; era positivo; eu sentia-o no sangue que
    me agitava o.
