- id: pt-br-scifi-slow-pap-is-avulsos-2
  title: "Papéis Avulsos"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #57001"
  source_url: https://www.gutenberg.org/ebooks/57001
  text: >
    Dito isto, meteu-se em Itaguaí, e entregou-se de corpo e alma ao estudo da
    ciência, alternando as curas com as leituras, e demonstrando os teoremas com
    cataplasmas. Aos quarenta anos casou com D. Evarista da Costa e Mascarenhas,
    senhora de vinte e cinco anos, viuva de um juiz de fora, e não bonita nem
    sympathica. Um dos tios dele, caçador de pacas perante o Eterno, e não menos
    franco, admirou-se de semelhante escolha e disse-lh'o. Simão Bacamarte
    explicou-lhe que D. Evarista reunia condições fysiologicas e anatomicas de
    primeira ordem, digeria com facilidade, dormia regularmente, tinha bom pulso,
    e excelente vista; estava assim apta para dar-lhe filhos robustos, sãos e
    intelligentes. Se além dessas prendas,--unicas dignas da preoecupação de um
    sabio, D. Evarista era mal composta de feições, longe de lastimal-o,
    agradecia-o a Deus, porquanto não corria o risco de preterir os interesses da
    ciência na contemplação exclusiva, miuda e vulgar.
- id: pt-br-scifi-slow-pap-is-avulsos-3
  title: "Papéis Avulsos"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #57001"
  source_url: https://www.gutenberg.org/ebooks/57001
  text: >
    A vereança de Itaguahy, entre outros pecados de que é arguida pelos
    cronistas, tinha o de não fazer caso dos dementes. Assim é que cada louco
    furioso era trancado em uma alcova, na própria casa, e, não curado, mas
    descurado, até que a morte o vinha defraudar do beneficio da vida; os mansos
    andavam a solta pela rua. Simão Bacamarte entendeu desde logo reformar tão
    ruim costume; pediu licença a camara para agasalhar e tratar no edificio que
    ia construir todos os loucos de Itaguahy e das demais villas e cidades,
    mediante um estipendio, que a camara lhe daria quando a família do enfermo o
    não podesse fazer. A proposta excitou a curiosidade de toda a vila, e
    encontrou grande resistencia, tão certo é que dificilmente se desarraigam
    habitos absurdos, ou ainda máus. A ideia de metter os loucos na mesma casa,
    vivendo em comum, pareceu em si mesma um.
- id: pt-br-scifi-slow-pap-is-avulsos-4
  title: "Papéis Avulsos"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #57001"
  source_url: https://www.gutenberg.org/ebooks/57001
  text: >
    --A caridade, Sr. Soares, entra de certo no meu procedimento, mas entra como
    tempero, como o sal das coisas, que é assim que interpreto o dito de S. Paulo
    aos Corinthios: «Se eu conhecer quanto se pode saber, e não tiver caridade,
    não sou nada.» O principal nesta minha obra da Casa Verde é estudar
    profundamente a loucura, os seus diversos grãos, classificar-lbe os casos,
    descobrir emfim a causa do fenomeno e o remedio universal. Este é o mistério
    do meu coração. Creio que com isto presto um bom serviço a humanidade. E
    tinham razão. De todas as villas e arraiaes visinhos affluiam loucos a Casa
    Verde. Eram furiosos, eram mansos, eram monomaniacos, era toda a família dos
    desherdados do espírito. Ao cabo de quatro meses, a Casa Verde era uma
    povoação. Não bastaram os primeiros cubiculos: mandou-se annexar uma galeria
    de mais trinte e sete. O padre Lopes confessou.
- id: pt-br-scifi-slow-hist-rias-sem-data-5
  title: "Histórias Sem Data"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #33056"
  source_url: https://www.gutenberg.org/ebooks/33056
  text: >
    Conta um velho manuscrito beneditino que o Diabo, em certo dia, teve a ideia
    de fundar uma igreja. Embora os seus lucros fossem contínuos e grandes,
    sentia-se humilhado com o papel avulso que exercia desde séculos, sem
    organisação, sem regras, sem canones, sem ritual, sem nada. Vivia, por assim
    dizer, dos remanescentes divinos, dos descuidos e obsequios humanos. Nada
    fixo, nada regular. Porque não teria ele a sua igreja? Uma igreja do Diabo era
    o meio efficaz de combater as outras religiões, e destruil-as de uma vez.
    --Vá, pois, uma igreja, concluiu ele. Escriptura contra Escriptura, breviário
    contra breviário. Terei a minha missa, com vinho e pão a farta, as minhas
    predicas, bullas, novenas e todo o demais aparelho ecclesiastico. O meu credo
    será o nucleo universal dos espíritos, a minha igreja uma tenda de Abrahão. E
    depois, enquanto as outras religiões se combatem e se dividem, a minha igreja.
- id: pt-br-scifi-slow-hist-rias-sem-data-6
  title: "Histórias Sem Data"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #33056"
  source_url: https://www.gutenberg.org/ebooks/33056
  text: >
    --Vá, pois, uma igreja, concluiu ele. Escriptura contra Escriptura, breviário
    contra breviário. Terei a minha missa, com vinho e pão a farta, as minhas
    predicas, bullas, novenas e todo o demais aparelho ecclesiastico. O meu credo
    será o nucleo universal dos espíritos, a minha igreja uma tenda de Abrahão. E
    depois, enquanto as outras religiões se combatem e se dividem, a minha igreja
    será unica; não acharei diante de mim, nem Mahomet, nem Luthero. Há muitos
    modos de affirmar; há só um de negar tudo. Dizendo isto, o Diabo sacudiu a
    cabeça e estendeu os braços, com um gesto magnífico e varonil. Em seguida,
    lembrou-se de ir ter com Deus para comunicar-lhe a ideia, e desafial-o;
    levantou os olhos, accesos de odio, asperos de vingança, e disse
    comsigo:--Vamos, é tempo. E rápido, batendo as asas, com tal estrondo que
    abalou todas as províncias do abysmo, arrancou da sombra para o.
- id: pt-br-scifi-slow-hist-rias-sem-data-7
  title: "Histórias Sem Data"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #33056"
  source_url: https://www.gutenberg.org/ebooks/33056
  text: >
    Dizendo isto, o Diabo sacudiu a cabeça e estendeu os braços, com um gesto
    magnífico e varonil. Em seguida, lembrou-se de ir ter com Deus para
    comunicar-lhe a ideia, e desafial-o; levantou os olhos, accesos de odio,
    asperos de vingança, e disse comsigo:--Vamos, é tempo. E rápido, batendo as
    asas, com tal estrondo que abalou todas as províncias do abysmo, arrancou da
    sombra para o infinito azul. --Não, mas provavelmente é dos últimos que virão
    ter comvosco. Não tarda muito que o céu fique semelhante a uma casa vazia, por
    causa do preço, que é alto. Vou edificar uma hospedaria barata; em duas
    palavras, vou fundar uma igreja. Estou cançado da minha desorganisação, do meu
    reinado casual e adventicio. É tempo de obter a victoria final e completa. E
    então vim dizer-vos isto, com lealdade, para que me não accuseis de
    dissimulação... Boa ideia, não vos parece?
- id: pt-br-scifi-slow-mem-rias-p-stumas-de-br-s-cubas-8
  title: "Memórias Póstumas de Brás Cubas"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #54829"
  source_url: https://www.gutenberg.org/ebooks/54829
  text: >
    Algum tempo hesitei se devia abrir estas memorias pelo principio ou pelo fim,
    isto é, se poria em primeiro lugar o meu nascimento ou a minha morte. Supposto
    o uso vulgar seja começar pelo nascimento, duas considerações me levaram a
    adoptar differente methodo: a primeira é que eu não sou propriamente um autor
    defunto, mas um defunto autor, para quem a campa foi outro berço; a segunda é
    que o escrito ficaria assim mais galante e mais novo. Moysés, que também
    contou a sua morte, não a poz no introito, mas no cabo: differença radical
    entre este livro e o Pentateuco.
- id: pt-br-scifi-slow-mem-rias-p-stumas-de-br-s-cubas-9
  title: "Memórias Póstumas de Brás Cubas"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #54829"
  source_url: https://www.gutenberg.org/ebooks/54829
  text: >
    Dito isto, expirei às duas horas da tarde de uma sexta feira do mês de agosto
    de 1869, na minha bella chacara de Catumby. Tinha uns sessenta e quatro anos,
    rijos e prosperos, era solteiro, possuia cerca de tresentos contos e fui
    acompanhado ao cemiterio por onze amigos. Onze amigos! Verdade é que não houve
    cartas nem annuncios. Accresce que chovia--peneirava--uma chuvinha miuda,
    triste e constante, tão constante e tão triste, que levou um daquelles fieis
    da ultima hora a intercalar esta engenhosa ideia no discurso que proferiu a
    beira de minha cova:--«Vós, que o conhecestes, meus senhores, vós podeis dizer
    commigo que a natureza parece estar chorando a perda irreparavel de um dos
    mais bellos caracteres que tem honrado a humanidade. Este ar sombrio, estas
    gotas do ceu, aquelas nuvens escuras que cobrem o azul como um crepe funereo,
    tudo isso é a dor crua e má que lhe.
- id: pt-br-scifi-slow-mem-rias-p-stumas-de-br-s-cubas-10
  title: "Memórias Póstumas de Brás Cubas"
  author: "Machado de Assis"
  source: "Project Gutenberg ebook #54829"
  source_url: https://www.gutenberg.org/ebooks/54829
  text: >
    Essa ideia era nada menos que a invenção de um medicamento sublime, um emplasto
    anti-hipocondriaco, destinado a alliviar a nossa melancolica humanidade. Na
    petição de privilegio que então redigi, chamei a attenção do governo para esse
    resultado, verdadeiramente cristão. Todavia, não neguei aos amigos as
    vantagens pecuniarias que deviam resultar da distribuição de um producto de
    tamanhos e tão profundos effeitos, Agora, porém, que estou cá do outro lado da
    vida, posso confessar tudo: o que me influiu principalmente foi o gosto de ver
    impressas nos jornaes, mostradores, folhetos, esquinas, e emfim nas caixinhas
    do remedio, estas três palavras: _emplasto Braz Cubas._ Para que negal-o? Eu
    tinha a paixão do arruido, do cartaz, do foguete de lagrimas. Talvez os
    modestos me arguam esse defeito; fio porém que esse talento me hão de
    reconhecer os hábeis; e eu era habil. Assim, a minha ideia trazia duas faces,
    como as medalhas, uma.
