  text: >
    As crônicas da vila de Itaguaí dizem que em tempos remotos vivera ali um certo
    médico, o Dr. Simão Bacamarte, filho da nobreza da terra e o maior dos médicos
    do Brasil, de Portugal e das Hespanhas. Estudara em Coimbra e Padua. Aos
    trinta e quatro anos regressou ao Brasil, não podendo el-rei alcançar dele
    que ficasse em Coimbra, regendo a universidade, ou era Lisboa, expedindo os
    negocios da monarchia. Dito isto, meteu-se em Itaguaí, e entregou-se de corpo
